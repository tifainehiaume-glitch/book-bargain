<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Bargain</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700;1,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/catalogue.css">
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/catalogue.js"></script>
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <nav>
    <a class="nav-logo" href="index.html">Book<em>Bargain</em></a>
    <ul class="nav-links">
      <li><a href="catalogue.html" class="active">Parcourir</a></li>
      <li><a href="mes-livres.html">Mes livres</a></li>
      <li><a href="profil.html">Mon profil</a></li>
      <li><a href="connexion.html" class="btn-nav">Se connecter</a></li>
    </ul>
  </nav>

  <!-- ── EN-TÊTE + RECHERCHE ── -->
  <div class="cat-header">
    <p class="eyebrow">Catalogue</p>
    <h1 class="section-title">Livres disponibles</h1>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Titre, auteur, genre…">
      <button onclick="rechercher()">Rechercher</button>
    </div>
  </div>

  <!-- ── FILTRES PAR GENRE ── -->
  <div class="genre-row">
    <button class="gpill active" onclick="filtrer('', this)">Tous</button>
    <button class="gpill" onclick="filtrer('roman', this)">Roman</button>
    <button class="gpill" onclick="filtrer('sf', this)">SF</button>
    <button class="gpill" onclick="filtrer('jeunesse', this)">Jeunesse</button>
    <button class="gpill" onclick="filtrer('manga', this)">Manga</button>
    <button class="gpill" onclick="filtrer('bd', this)">BD</button>
    <button class="gpill" onclick="filtrer('essai', this)">Essai</button>
  </div>

  <!-- ── GRILLE DE LIVRES (remplie par JS) ── -->
  <div class="books-grid" id="books-grid">

    <!-- Chargement -->
    <p style="color:var(--text-mid);padding:2rem;">Chargement…</p>

  </div>

  <!-- ── MODAL ÉCHANGE ── -->
  <div class="modal-overlay" id="modal-echange"
       onclick="if(event.target===this)this.classList.remove('active')">
    <div class="modal">

      <button class="modal-close"
              onclick="document.getElementById('modal-echange').classList.remove('active')">
        Fermer ✕
      </button>

      <!-- Id du livre caché -->
      <input type="hidden" id="modal-livre-id">

      <h3>Proposer un échange</h3>
      <p>
        Propose un livre à
        <strong id="modal-prenom"></strong>
        pour obtenir
        "<strong id="modal-titre"></strong>".
      </p>

      <div class="modal-note">
        🔒 Ton email ne sera transmis qu'après acceptation.
      </div>

      <div class="field">
        <label for="exch-livre">Livre que tu proposes</label>
        <select id="exch-livre">
          <option value="" disabled selected>Choisir un de tes livres…</option>
        </select>
      </div>

      <button class="btn btn-primary btn-full mt-2" onclick="envoyerEchange()">
        Envoyer la demande
      </button>

    </div>
  </div>


</body>
</html>
