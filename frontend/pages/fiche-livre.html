<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Bargain</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700;1,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/fiche-livre.css">
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/fiche-livre.js"></script>
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <nav>
    <a class="nav-logo" href="index.html">Book<em>Bargain</em></a>
    <ul class="nav-links">
      <li><a href="catalogue.html">Parcourir</a></li>
      <li><a href="mes-livres.html">Mes livres</a></li>
      <li><a href="profil.html">Mon profil</a></li>
      <li><a href="connexion.html" class="btn-nav">Se connecter</a></li>
    </ul>
  </nav>

  <!-- ── FIL D'ARIANE ── -->
  <div class="breadcrumb">
    <a href="index.html">Accueil</a> ›
    <a href="catalogue.html">Catalogue</a> ›
    <span id="breadcrumb-titre">Livre</span>
  </div>

  <!-- ── CONTENU PRINCIPAL (rempli par fiche-livre.js) ── -->
  <div class="book-hero" id="book-hero">
    <p style="color:var(--text-mid);padding:2rem;">Chargement…</p>
  </div>

  <!-- ── MODAL ÉCHANGE ── -->
  <div class="modal-overlay" id="modal"
       onclick="if(event.target===this)this.classList.remove('active')">
    <div class="modal">

      <button class="modal-close"
              onclick="document.getElementById('modal').classList.remove('active')">
        Fermer ✕
      </button>

      <!-- Id du livre (caché) -->
      <input type="hidden" id="modal-livre-id">

      <h3>Proposer un échange</h3>
      <p id="modal-desc"></p>

      <div class="modal-note">
        🔒 Ton email ne sera transmis qu'après acceptation.
      </div>

      <div class="field">
        <label for="exch-livre">Livre que tu proposes</label>
        <input type="text" id="exch-livre" placeholder="Titre du livre">
      </div>

      <button class="btn btn-primary btn-full mt-2" onclick="envoyerEchange()">
        Envoyer la demande
      </button>

    </div>
  </div>



</body>
</html>
