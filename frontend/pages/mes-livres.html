<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Bargain</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700;1,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/mes-livres.css">
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/mes-livres.js"></script>
</head>
<body>

  <!-- ── NAVIGATION ── -->
  <nav>
    <a class="nav-logo" href="index.html">Book<em>Bargain</em></a>
    <ul class="nav-links">
      <li><a href="catalogue.html">Parcourir</a></li>
      <li><a href="mes-livres.html" class="active">Mes livres</a></li>
      <li><a href="profil.html">Mon profil</a></li>
      <li><a href="connexion.html" class="btn-nav">Se déconnecter</a></li>
    </ul>
  </nav>

  <!-- ── EN-TÊTE ── -->
  <div class="page-header">
    <h1 class="section-title">Mes livres</h1>
    <button class="btn btn-primary"
            onclick="document.getElementById('modal-propose').classList.add('active')">
      + Proposer un livre
    </button>
  </div>

  <!-- ── ONGLETS ── -->
  <div class="tabs">
    <button class="tab active" onclick="sw(0)">
      Mes livres <span class="tab-count" id="count-livres">0</span>
    </button>
    <button class="tab" onclick="sw(1)">
      Échanges en cours <span class="tab-count" id="count-echanges">0</span>
    </button>
  </div>

  <!-- ── PANNEAU 1 : MES LIVRES (rempli par JS) ── -->
  <div class="tab-panel active" id="tp-0">
    <div class="books-grid" id="grille-mes-livres">
      <p style="color:var(--text-mid);">Chargement…</p>
    </div>
  </div>

  <!-- ── PANNEAU 2 : ÉCHANGES EN COURS (rempli par JS) ── -->
  <div class="tab-panel" id="tp-1">
    <div class="exchanges" id="liste-echanges">
      <p style="color:var(--text-mid);">Chargement…</p>
    </div>
  </div>

  <!-- ── MODAL PROPOSER UN LIVRE ── -->
  <div class="modal-overlay" id="modal-propose"
       onclick="if(event.target===this)this.classList.remove('active')">
    <div class="modal">

      <button class="modal-close"
              onclick="document.getElementById('modal-propose').classList.remove('active')">
        Fermer ✕
      </button>

      <h3>Proposer un livre</h3>
      <p>Mets ton livre à disposition de la communauté.</p>

      <div class="mrow">
        <div class="mfield">
          <label for="p-titre">Titre *</label>
          <input type="text" id="p-titre" placeholder="Ex : Dune">
        </div>
        <div class="mfield">
          <label for="p-auteur">Auteur·ice *</label>
          <input type="text" id="p-auteur" placeholder="Ex : Frank Herbert">
        </div>
      </div>

      <div class="mrow">
        <div class="mfield">
          <label for="p-genre">Genre *</label>
          <select id="p-genre">
            <option value="" disabled selected>Choisir…</option>
            <option value="roman">Roman</option>
            <option value="sf">Science-fiction</option>
            <option value="jeunesse">Jeunesse / YA</option>
            <option value="manga">Manga</option>
            <option value="bd">BD</option>
            <option value="essai">Essai</option>
          </select>
        </div>
        <div class="mfield">
          <label for="p-ville">Ville *</label>
          <input type="text" id="p-ville" placeholder="Lyon">
        </div>
      </div>

      <!-- Sélection état du livre -->
      <div class="mfield">
        <label>État *</label>
        <div class="etat-group">
          <div class="etat-pill" onclick="selEtat(this)">✨ Neuf</div>
          <div class="etat-pill sel" onclick="selEtat(this)">👍 Très bon</div>
          <div class="etat-pill" onclick="selEtat(this)">👌 Bon</div>
          <div class="etat-pill" onclick="selEtat(this)">📖 Acceptable</div>
        </div>
      </div>

      <button class="btn btn-primary btn-full mt-2" onclick="soumettreProposition()">
        Publier mon livre
      </button>

    </div>
  </div>

</body>
</html>
