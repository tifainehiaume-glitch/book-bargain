<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Bargain</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700;1,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/connexion.css">
</head>
<body>

  <!--  NAVIGATION  -->
  <nav>
    <a class="nav-logo" href="index.html">Book<em>Bargain</em></a>
    <ul class="nav-links">
      <li><a href="catalogue.html">Parcourir</a></li>
      <li><a href="connexion.html" class="active">Connexion</a></li>
    </ul>
  </nav>

  <!--  CONTENU PRINCIPAL  -->
  <main>
    <div class="auth-box">

      <!-- Onglets -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Se connecter</button>
        <button class="auth-tab" onclick="switchTab('register')">S'inscrire</button>
      </div>

      <!--  FORMULAIRE CONNEXION  -->
      <div class="form-panel active" id="panel-login">
        <h1 class="form-title">Bon retour !</h1>
        <p class="form-sub">Content de te revoir parmi les lecteurs.</p>
        <div class="field">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="toi@exemple.fr">
        </div>
        <div class="field">
          <label for="login-mdp">Mot de passe</label>
          <input type="password" id="login-mdp" placeholder="••••••••">
          <a class="forgot" href="#">Mot de passe oublié ?</a>
        </div>
        <button class="btn btn-primary btn-full mt-2" onclick="window.location='profil.html'">Se connecter</button>
      </div>

      <!--  FORMULAIRE INSCRIPTION  -->
      <div class="form-panel" id="panel-register">
        <h1 class="form-title">Rejoindre</h1>
        <p class="form-sub">Crée ton compte en deux minutes.</p>
        <div class="field-row">
          <div class="field"><label for="reg-prenom">Prénom</label><input type="text" id="reg-prenom" placeholder="Léa"></div>
          <div class="field"><label for="reg-nom">Nom</label><input type="text" id="reg-nom" placeholder="Martin"></div>
        </div>
        <div class="field"><label for="reg-email">E-mail</label><input type="email" id="reg-email" placeholder="toi@exemple.fr"></div>
        <div class="field"><label for="reg-ville">Ville</label><input type="text" id="reg-ville" placeholder="Lyon"></div>
        <div class="field"><label for="reg-mdp">Mot de passe</label><input type="password" id="reg-mdp" placeholder="8 caractères min."></div>
        <button class="btn btn-primary btn-full mt-2" onclick="window.location='profil.html'">Créer mon compte</button>
        <p class="terms">En t'inscrivant, tu acceptes nos <a href="#">Conditions d'utilisation</a>.</p>
      </div>

    </div>
  </main>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1));
      });
      document.getElementById('panel-login').classList.toggle('active', tab==='login');
      document.getElementById('panel-register').classList.toggle('active', tab==='register');
    }
  </script>

</body>
</html>
